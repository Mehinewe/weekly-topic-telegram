name: Weekly Telegram topic

on:
  # Runs every Monday at 10:00 AM GMT/UTC. GitHub cron is always in UTC,
  # and GMT == UTC, so no conversion is needed.
  schedule:
    - cron: "0 10 * * 1"   # 10:00 GMT every Monday

  # Lets you trigger a test run by hand from the Actions tab.
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post this week's topic
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_weekly_topic.py
