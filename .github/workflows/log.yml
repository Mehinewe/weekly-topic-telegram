name: Log group activity

on:
  # Runs near the top of every hour. Telegram only keeps undelivered updates
  # for ~24h, so we poll often to catch messages before they age out.
  schedule:
    - cron: "5 * * * *"   # hh:05 every hour, UTC

  # Lets you trigger a catch-up run by hand from the Actions tab.
  workflow_dispatch:

# Never let two logging runs overlap: they both commit the log, which would
# race. A new run waits for the previous one rather than running concurrently.
concurrency:
  group: activity-log
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated log back to the repo
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll Telegram and append to the activity log
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python log_activity.py

      - name: Commit the updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity_log.csv activity_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Log group activity ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
